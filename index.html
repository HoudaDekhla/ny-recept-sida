<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Chokladkaka recept</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

  <header>
    <img src="kaka.jpg" alt="Chokladkaka" class="hero-image">
  </header>

  <section class="recipe-intro">
    <h1>Chokladkaka</h1>
    <p class="info-box">
      Här lagar du en riktigt saftig och god chokladkaka
    </p>
  </section>

  <section>
    <h2>Ingredienser</h2>
    <ul>
      <li>2 ägg</li>
      <li>1 dl socker</li>
      <li>2 dl mjöl</li>
      <li>1/2 msk kakao</li>
    </ul>
  </section>

  <section>
    <h2>Instruktioner</h2>
    <ol>
      <li>Blanda allt</li>
      <li>Häll i form</li>
      <li>Grädda 20 min</li>
    </ol>
  </section>

  <section>
    <h2>Fler bilder</h2>

    <div class="image-row">
      <figure>
        <img src="kaka2.jpg" alt="Chokladkaka i närbild">
      </figure>

      <figure>
        <img src="kaka3.jpg" alt="Chokladkaka serverad">
      </figure>
    </div>
  </section>

</main>

</body>
</html>
